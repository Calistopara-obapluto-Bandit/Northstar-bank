<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfers - Northstar Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="js/auth.js"></script>
  <script src="js/dashboard-interactions.js"></script>
  <style>
    :root {
      --navy: #071d3a;
      --blue: #0a4e9b;
      --gold: #f3b600;
      --cream: #f7f5f0;
      --ink: #152238;
      --muted: #5f6b7a;
      --line: #dfe4ea;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: "DM Sans", Arial, sans-serif; background: var(--cream); color: var(--ink); }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1160px, calc(100% - 40px)); margin: auto; }
    
    header { color: #fff; background: var(--navy); }
    .topbar { min-height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .brand { display: flex; align-items: center; gap: 11px; color: #fff; font-family: "Playfair Display", serif; font-size: 24px; letter-spacing: -0.7px; }
    .brand-mark { display: grid; place-items: center; width: 34px; height: 34px; border: 2px solid var(--gold); color: var(--gold); font: 700 19px Georgia, serif; }
    .utility { display: flex; align-items: center; gap: 22px; font-size: 14px; }
    .utility a:hover { color: var(--gold); }
    .signin { padding: 10px 17px; color: var(--navy); background: var(--gold); font-weight: 700; border-radius: 2px; border: none; cursor: pointer; }
    .nav-row { border-top: 1px solid rgba(255,255,255,0.18); }
    .nav { height: 50px; display: flex; align-items: center; gap: 35px; font-size: 15px; font-weight: 600; }
    .nav a:hover { color: var(--gold); }
    
    .dashboard { display: block; min-height: calc(100vh - 126px); }
    .dashboard-head { padding: 20px 0; color: #fff; background: var(--navy); }
    .dashboard-head .container { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .dashboard-main { padding: 48px 0 70px; }
    .dashboard-title { display: flex; justify-content: space-between; gap: 20px; align-items: end; margin-bottom: 30px; }
    .dashboard-title h1 { margin: 0; font-size: 43px; font-family: "Playfair Display", serif; }
    .dashboard-title p { margin: 8px 0 0; color: var(--muted); }
    
    .dash-grid { display: grid; grid-template-columns: 1.4fr 0.9fr; gap: 25px; }
    .transfer-form, .recent-transfers { padding: 25px; background: #fff; border: 1px solid var(--line); border-radius: 6px; }
    .transfer-form h2, .recent-transfers h2 { margin: 0 0 18px; font-family: "DM Sans", sans-serif; font-size: 19px; letter-spacing: 0; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .form-select, .form-input { width: 100%; padding: 12px 15px; border: 1px solid var(--line); border-radius: 2px; font-size: 15px; font-family: inherit; }
    .form-select:focus, .form-input:focus { outline: none; border-color: var(--gold); }
    
    .amount-input { display: flex; align-items: center; }
    .currency-symbol { padding: 12px 15px; background: #f7f5f0; border: 1px solid var(--line); border-right: none; border-radius: 2px 0 0 2px; font-weight: 600; }
    .amount-input .form-input { border-radius: 0 2px 2px 0; }
    
    .submit-btn { width: 100%; padding: 14px 20px; background: var(--navy); color: #fff; border: none; border-radius: 2px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
    .submit-btn:hover { background: var(--blue); }
    .submit-btn:disabled { opacity: 0.6; cursor: default; }
    .form-message { margin-bottom: 18px; padding: 12px 14px; border-radius: 4px; font-size: 14px; font-weight: 600; }
    .form-message.success { color: #17663c; background: #e1f5e8; border-left: 4px solid #28744d; }
    .form-message.error { color: #8a1c1c; background: #fdecec; border-left: 4px solid #c0392b; }
    
    .recent-transfers { margin-top: 25px; }
    .recent-transfers h3 { margin: 0 0 15px; font-size: 17px; font-weight: 600; }
    
    .transfer-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px solid var(--line); }
    .transfer-item:first-of-type { border-top: 0; }
    .transfer-info { flex: 1; }
    .transfer-title { font-weight: 600; }
    .transfer-date { display: block; margin-top: 4px; color: var(--muted); font-size: 13px; }
    .transfer-amount { font-weight: 700; font-size: 16px; }
    .transfer-amount.positive { color: #28744d; }
    .transfer-amount.negative { color: var(--ink); }
    
    .signout { padding: 8px 0; border: 0; color: var(--gold); background: transparent; font: inherit; font-weight: 700; cursor: pointer; }
    
    @media (max-width: 900px) {
      .dash-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .dashboard-title { display: block; }
      .dashboard-title h1 { font-size: 35px; }
      .topbar { flex-wrap: wrap; min-height: auto; padding: 15px 0; }
      .nav { overflow-x: auto; gap: 20px; -webkit-overflow-scrolling: touch; }
      .nav::-webkit-scrollbar { display: none; }
      .container { width: calc(100% - 20px); }
      .dashboard-main { padding: 30px 0; }
      .transfer-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .transfer-amount { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <a class="brand" href="index.html"><span class="brand-mark">N</span>Northstar Bank</a>
      <div class="utility">
        <a href="support.html">Help & support</a>
        <button class="signout">Sign out</button>
      </div>
    </div>
    <div class="nav-row">
      <nav class="container nav" aria-label="Main navigation">
        <a href="dashboard.html">Overview</a>
        <a href="accounts.html">Accounts</a>
        <a href="transfers.html" style="color: var(--gold);">Transfers</a>
        <a href="payments.html">Bill Pay</a>
        <a href="cards.html">Cards</a>
        <a href="goals.html">Goals</a>
        <a href="statements.html">Statements</a>
      </nav>
    </div>
  </header>
  
  <div class="dashboard">
    <div class="dashboard-head">
      <div class="container">
        <div class="dashboard-title">
          <div>
            <h1>Transfer Money</h1>
            <p>Move money between your accounts or to others</p>
          </div>
          <p style="color: rgba(255,255,255,0.7);">As of July 15, 2026</p>
        </div>
      </div>
    </div>
    
    <div class="dashboard-main">
      <div class="container">
        <div class="dash-grid">
          <div class="left-column">
            <form class="transfer-form" id="transferForm">
              <h2>New Transfer</h2>
              <div class="form-message" id="transferMessage" hidden></div>
              <div class="form-group">
                <label for="fromAccount">From Account</label>
                <select class="form-select" id="fromAccount"></select>
              </div>
              <div class="form-group">
                <label for="toAccount">To Account</label>
                <select class="form-select" id="toAccount"></select>
              </div>
              <div class="form-group" id="externalGroup" hidden>
                <label for="externalName">Recipient name</label>
                <input type="text" class="form-input" id="externalName" placeholder="e.g. John Smith">
              </div>
              <div class="form-group">
                <label for="amount">Amount</label>
                <div class="amount-input">
                  <span class="currency-symbol">$</span>
                  <input type="text" inputmode="decimal" class="form-input" id="amount" placeholder="0.00">
                </div>
              </div>
              <div class="form-group">
                <label for="memo">Memo (Optional)</label>
                <input type="text" class="form-input" id="memo" placeholder="Add a note for your records">
              </div>
              <button class="submit-btn" id="transferSubmit" type="submit">Transfer Funds</button>
            </form>
          </div>
          
          <div class="right-column">
            <div class="recent-transfers">
              <h2>Recent Transfers</h2>
              <div id="recentTransfers">
                <p class="transfer-date" style="padding:10px 0;">Loading…</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';
      var fromSel = document.getElementById('fromAccount');
      var toSel = document.getElementById('toAccount');
      var externalGroup = document.getElementById('externalGroup');
      var externalName = document.getElementById('externalName');
      var amountInput = document.getElementById('amount');
      var memoInput = document.getElementById('memo');
      var form = document.getElementById('transferForm');
      var submitBtn = document.getElementById('transferSubmit');
      var messageEl = document.getElementById('transferMessage');
      var recentEl = document.getElementById('recentTransfers');

      var EXTERNAL = 'external';

      function money(n) { return window.Northstar.formatMoney(n); }

      function accountLabel(a) {
        return a.name + ' (' + (a.account_number || '') + ') — ' + money(a.balance);
      }

      function showMessage(text, kind) {
        messageEl.textContent = text;
        messageEl.className = 'form-message ' + kind;
        messageEl.hidden = false;
      }

      function clearMessage() { messageEl.hidden = true; }

      function populateAccounts(accounts) {
        var fromVal = fromSel.value;
        var toVal = toSel.value;
        fromSel.innerHTML = '';
        toSel.innerHTML = '';
        accounts.forEach(function (a) {
          var o1 = document.createElement('option');
          o1.value = String(a.id);
          o1.textContent = accountLabel(a);
          fromSel.appendChild(o1);
          var o2 = document.createElement('option');
          o2.value = String(a.id);
          o2.textContent = accountLabel(a);
          toSel.appendChild(o2);
        });
        var ext = document.createElement('option');
        ext.value = EXTERNAL;
        ext.textContent = 'External account / another person';
        toSel.appendChild(ext);

        // Restore previous selection when possible, else pick sensible defaults.
        fromSel.value = fromVal || (accounts[0] && String(accounts[0].id)) || '';
        if (toVal) {
          toSel.value = toVal;
        } else if (accounts[1]) {
          toSel.value = String(accounts[1].id);
        }
        toggleExternal();
      }

      function toggleExternal() {
        externalGroup.hidden = toSel.value !== EXTERNAL;
      }

      function renderRecent(transactions) {
        var transfers = (transactions || []).filter(function (t) {
          return /^Transfer\b/i.test(t.description || '');
        }).slice(0, 8);
        if (!transfers.length) {
          recentEl.innerHTML = '<p class="transfer-date" style="padding:10px 0;">No transfers yet.</p>';
          return;
        }
        recentEl.innerHTML = transfers.map(function (t) {
          var positive = t.amount >= 0;
          var sign = positive ? '+' : '-';
          var amt = sign + money(Math.abs(t.amount)).replace('-', '');
          return '<div class="transfer-item">' +
            '<div class="transfer-info">' +
            '<div class="transfer-title">' + escapeHtml(t.description) + '</div>' +
            '<div class="transfer-date">' + escapeHtml(t.date || '') +
            (t.detail ? ' • ' + escapeHtml(t.detail) : '') + '</div>' +
            '</div>' +
            '<div class="transfer-amount ' + (positive ? 'positive' : 'negative') + '">' + amt + '</div>' +
            '</div>';
        }).join('');
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function render(me) {
        if (!me) return;
        populateAccounts(me.accounts || []);
        renderRecent(me.transactions || []);
      }

      toSel.addEventListener('change', toggleExternal);

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearMessage();

        var fromId = parseInt(fromSel.value, 10);
        var toRaw = toSel.value;
        var amount = parseFloat(String(amountInput.value).replace(/[$,\s]/g, ''));

        if (!fromId) { showMessage('Choose an account to transfer from.', 'error'); return; }
        if (!amount || amount <= 0) { showMessage('Enter an amount greater than zero.', 'error'); return; }

        var body = { from_account_id: fromId, amount: amount, memo: memoInput.value.trim() };
        if (toRaw === EXTERNAL) {
          body.external_name = externalName.value.trim();
        } else {
          var toId = parseInt(toRaw, 10);
          if (toId === fromId) { showMessage('Choose two different accounts.', 'error'); return; }
          body.to_account_id = toId;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Transferring…';
        window.Northstar.authApi('/api/transfers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(function (me) {
          window.Northstar.me = me;
          render(me);
          amountInput.value = '';
          memoInput.value = '';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Transfer Funds';
          showMessage('Transfer complete. ' + money(amount) + ' moved successfully.', 'success');
        }, function (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Transfer Funds';
          showMessage(err.message, 'error');
        });
      });

      document.addEventListener('northstar:me', function (e) { render(e.detail); });
      if (window.Northstar && window.Northstar.me) render(window.Northstar.me);
    })();
  </script>
</body>
</html>
